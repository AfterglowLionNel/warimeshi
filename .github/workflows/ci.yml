name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチでの後続 push があれば古い実行はキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ビルド/型チェックで参照されることがある env のダミー値
  AUTH_SECRET: ci-dummy-secret-do-not-use-in-prod
  INVITE_PASSWORD_SECRET: ci-dummy-invite-secret-not-for-prod
  AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  DATABASE_URL: postgres://ci:ci@localhost:5432/ci
  # actions/checkout 等を Node 24 で動かす (Node 20 非推奨警告対応)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
