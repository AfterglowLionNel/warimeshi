<svg width="180" height="180" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF5722" stop-opacity="1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.30"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFF3D6" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>

  <g filter="url(#softShadow)">
    <path d="M196 132 Q 210 108, 196 86" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.95"/>
    <path d="M256 122 Q 270 98, 256 74" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.95"/>
    <path d="M316 132 Q 330 108, 316 86" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.95"/>

    <path d="M116 230 C 116 380, 190 460, 256 460 C 322 460, 396 380, 396 230 Z" fill="url(#bowlGrad)"/>
    <rect x="116" y="190" width="280" height="44" rx="16" fill="#FFFFFF" opacity="0.98"/>

    <g fill="#FF5722" opacity="0.95">
      <circle cx="206" cy="300" r="24"/>
      <rect x="180" y="330" width="52" height="38" rx="19"/>
      <circle cx="306" cy="300" r="24"/>
      <rect x="280" y="330" width="52" height="38" rx="19"/>
    </g>
  </g>
</svg>
