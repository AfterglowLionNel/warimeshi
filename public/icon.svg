<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <g filter="url(#softShadow)">
    <path d="M200 120 Q 210 100, 200 80" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M256 110 Q 266 90, 256 70" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M312 120 Q 322 100, 312 80" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round"/>

    <path d="M116 230 C 116 380, 190 460, 256 460 C 322 460, 396 380, 396 230 Z" fill="#FFF8E1"/>
    <rect x="116" y="190" width="280" height="40" rx="15" fill="#FFFFFF"/>

    <circle cx="256" cy="265" r="30" fill="#FF5722"/>
    <rect x="186" y="320" width="140" height="26" rx="13" fill="#FF5722"/>
    <circle cx="256" cy="400" r="30" fill="#FF5722"/>
  </g>
</svg>